model:
  name: "Qwen/Qwen3-8B"
  quantization: "nf4"
  max_seq_length: 2048

training:
  r: 16
  lora_alpha: 16
  epochs: 3
  lr: 0.0002
  batch_size: 4
  gradient_accumulation_steps: 4

rag:
  chunk_size: 500
  chunk_overlap: 50
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  top_k: 3

safety:
  crisis_keywords_file: "config/crisis_keywords.txt"
  enable_sticky_crisis: true
